- name: Provision AWS Environment
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: ansible-vpc
        cidr_block: 172.23.0.0/16
        region: us-east-1
        tags:
          ansible: "true"
      register: vpc

    - name: Create Subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 172.23.1.0/24
        az: us-east-1a
        region: us-east-1
        map_public: yes
        tags:
          ansible: "true"
      register: subnet

    - name: Create Security Group
      amazon.aws.ec2_security_group:
        name: webserver-sg
        description: Web Security Group
        vpc_id: "{{ vpc.vpc.id }}"
        region: us-east-1
        rules:
          - proto: tcp
            ports:
              - 80
            cidr_ip: 0.0.0.0/0
          - proto: tcp
            ports:
              - 22
            cidr_ip: 0.0.0.0/0
        tags:
          ansible: "true"
      register: sg

    - name: Create Key Pair
      amazon.aws.ec2_key:
        name: my-key
        region: us-east-1
        tags:
          ansible: "true"
      register: key_pair

    - name: Save private key locally
      copy:
        content: "{{ key_pair.key.private_key }}"
        dest: "~/.ssh/my-key.pem"
        mode: "0600"
      when: key_pair.changed and key_pair.key.private_key is defined

    - name: Ensure exact count of EC2 instances
      amazon.aws.ec2_instance:
        key_name: my-key
        instance_type: t3.medium
        image_id: ami-0c7217cdde317cfec
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        security_group: "{{ sg.group_id }}"
        wait: yes
        exact_count: 2
        filters:
          "tag:Role": "webserver"
          "tag:Environment": "dev"
          "vpc-id": "{{ vpc.vpc.id }}"
        tags:
          Role: webserver
          Environment: dev
          ansible: "true"
