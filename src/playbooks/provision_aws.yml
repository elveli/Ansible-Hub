- name: Provision AWS Environment
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: my-vpc
        cidr_block: 10.0.0.0/16
        region: us-east-1
      register: vpc

    - name: Create Subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 10.0.1.0/24
        region: us-east-1

    - name: Ensure exact count of EC2 instances
      amazon.aws.ec2_instance:
        key_name: my-key
        instance_type: t3.medium
        image_id: ami-123456
        wait: yes
        security_group: webserver
        exact_count: 2
        filters:
          "tag:Role": "webserver"
        tags:
          Role: webserver
