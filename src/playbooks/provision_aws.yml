- name: Provision AWS Environment
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create VPC
      ec2_vpc_net:
        name: my-vpc
        cidr_block: 10.0.0.0/16
        region: us-east-1
      register: vpc

    - name: Create Subnet
      ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 10.0.1.0/24
        region: us-east-1

    - name: Ensure exact count of EC2 instances
      ec2:
        key_name: my-key
        instance_type: t3.medium
        image: ami-123456
        wait: yes
        group: webserver
        count: 2
