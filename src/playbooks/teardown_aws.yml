- name: Teardown AWS Environment
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Terminate EC2 instances
      amazon.aws.ec2_instance:
        state: absent
        filters:
          "tag:Role": "webserver"
        region: us-east-1

    - name: Delete Key Pair
      amazon.aws.ec2_key:
        name: my-key
        region: us-east-1
        state: absent

    - name: Delete local private key file
      file:
        path: "./my-key.pem"
        state: absent

    - name: Gather VPC facts
      amazon.aws.ec2_vpc_net_info:
        filters:
          "tag:Name": "my-vpc"
        region: us-east-1
      register: vpc_facts

    - name: Delete Security Group
      amazon.aws.ec2_security_group:
        name: webserver-sg
        vpc_id: "{{ vpc_facts.vpcs[0].id }}"
        state: absent
        region: us-east-1
      when: vpc_facts.vpcs | length > 0

    - name: Delete Subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc_facts.vpcs[0].id }}"
        cidr: 10.0.1.0/24
        state: absent
        region: us-east-1
      when: vpc_facts.vpcs | length > 0

    - name: Delete VPC
      amazon.aws.ec2_vpc_net:
        name: my-vpc
        cidr_block: 10.0.0.0/16
        state: absent
        region: us-east-1
